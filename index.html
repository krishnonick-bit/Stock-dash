<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחלץ נתונים פיננסיים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #1e1b4b); background-size: 400% 400%; animation: gradient 15s ease infinite; min-height: 100vh; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .loader { border-top-color: #6366f1; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-8">

    <div class="max-w-4xl w-full glass-card rounded-[2rem] shadow-2xl overflow-hidden p-8 md:p-12">
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-indigo-900 mb-4">מחלץ נתונים פיננסיים</h1>
            <p class="text-gray-600">הזינו סימולי מניות (AAPL, TSLA) ולחצו על טען.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 text-right">
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold mb-2">סימולי מניות (באנגלית, מופרדים בפסיק)</label>
                <input id="tickers" type="text" value="AAPL, TSLA" class="w-full px-4 py-3 rounded-xl border outline-none focus:ring-2 focus:ring-indigo-500 text-left" dir="ltr">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">תאריך התחלה</label>
                <input id="startDate" type="date" value="2024-01-01" class="w-full px-4 py-3 rounded-xl border outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">תאריך סיום</label>
                <input id="endDate" type="date" value="2026-04-28" class="w-full px-4 py-3 rounded-xl border outline-none">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold mb-2">תדירות</label>
                <select id="frequency" class="w-full px-4 py-3 rounded-xl border outline-none bg-white">
                    <option value="daily">יומי</option>
                    <option value="weekly">שבועי</option>
                </select>
            </div>
        </div>

        <button onclick="fetchMarketData()" id="mainBtn" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-all flex items-center justify-center gap-3 shadow-lg">
            <span id="btnText">טען נתונים</span>
            <div id="loader" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full loader"></div>
        </button>

        <div id="alertBox" class="hidden mt-6 p-4 rounded-xl text-center font-medium"></div>

        <div id="previewContainer" class="mt-12 hidden">
            <h3 class="font-bold text-indigo-900 mb-4 text-right">תצוגה מקדימה:</h3>
            <div class="overflow-x-auto rounded-xl border bg-white/50 mb-6 shadow-inner">
                <table id="previewTable" class="w-full text-sm text-right"></table>
            </div>
            <div class="flex gap-4 justify-center">
                <button onclick="downloadCSV()" class="px-8 py-3 bg-emerald-500 text-white rounded-lg font-bold shadow-md hover:bg-emerald-600 transition-all">הורד CSV</button>
                <button onclick="exportToSheets()" class="px-8 py-3 bg-blue-600 text-white rounded-lg font-bold shadow-md hover:bg-blue-700 transition-all">פתח ב-Google Sheets</button>
            </div>
        </div>
    </div>

    <script>
        // ה-URL המעודכן שלך
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbym_l_XLwJJm08vh7ugSaky_JXwSRp6pPWLIdGQ0WD4-XdbfsBbz5utnVSDf4SbRIVC/exec";
        let globalCSVData = "";

        // פונקציית עזר להצגת הודעות
        function showAlert(msg, isError = true) {
            const box = document.getElementById('alertBox');
            box.innerText = msg;
            box.className = `mt-6 p-4 rounded-xl text-center ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            box.classList.remove('hidden');
        }

        // הפונקציה המרכזית - וודא שהיא נראית בדיוק ככה
        async function fetchMarketData() {
            console.log("התחלת פעולת משיכה...");
            const tickers = document.getElementById('tickers').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            if (!tickers || !startDate || !endDate) {
                showAlert("נא למלא את כל השדות.");
                return;
            }

            // מצב טעינה
            document.getElementById('alertBox').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('btnText').innerText = "מתחבר לשרת...";
            document.getElementById('mainBtn').disabled = true;

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        tickers: tickers,
                        startDate: startDate,
                        endDate: endDate,
                        frequency: document.getElementById('frequency').value,
                        action: 'csv'
                    })
                });

                const result = await response.json();
                console.log("תגובת שרת:", result);

                if (result.status === "success") {
                    globalCSVData = result.csvData;
                    renderTable(result.csvData);
                } else {
                    showAlert("שגיאה: " + result.message);
                }
            } catch (err) {
                console.error(err);
                showAlert("תקלה בתקשורת. וודא שהסקריפט מפורסם כ-Web App ל-Anyone.");
            } finally {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('btnText').innerText = "טען נתונים";
                document.getElementById('mainBtn').disabled = false;
            }
        }

        function renderTable(csv) {
            const rows = csv.trim().split('\n').slice(0, 7);
            let h = "";
            rows.forEach((r, i) => {
                const cells = r.split(',');
                h += `<tr>`;
                cells.forEach(c => {
                    const tag = i === 0 ? 'th' : 'td';
                    const style = i === 0 ? 'bg-indigo-50 font-bold p-3 border-b' : 'p-3 border-b';
                    h += `<${tag} class="${style}">${c}</${tag}>`;
                });
                h += `</tr>`;
            });
            document.getElementById('previewTable').innerHTML = h;
            document.getElementById('previewContainer').classList.remove('hidden');
            document.getElementById('previewContainer').scrollIntoView({ behavior: 'smooth' });
        }

        function downloadCSV() {
            const blob = new Blob([globalCSVData], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Stocks_${new Date().toLocaleDateString()}.csv`;
            a.click();
        }

        async function exportToSheets() {
            showAlert("מייצא לגליון גוגל...", false);
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        tickers: document.getElementById('tickers').value,
                        startDate: document.getElementById('startDate').value,
                        endDate: document.getElementById('endDate').value,
                        frequency: document.getElementById('frequency').value,
                        action: 'sheet'
                    })
                });
                const res = await response.json();
                if (res.status === "success") {
                    showAlert("הייצוא הצליח!", false);
                    window.open(res.sheetUrl, '_blank');
                } else { showAlert(res.message); }
            } catch (e) { showAlert("תקלה בייצוא"); }
        }
    </script>
</body>
</html>
