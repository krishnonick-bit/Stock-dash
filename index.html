<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחלץ נתונים פיננסיים פרימיום</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #1e1b4b);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 2rem;
        }
        .loader { border-top-color: #6366f1; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="max-w-4xl w-full glass-card shadow-2xl overflow-hidden p-8 md:p-12">
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-indigo-900 mb-4">מחלץ נתונים פיננסיים</h1>
            <p class="text-gray-600 text-lg leading-relaxed">
                ברוכים הבאים. הזינו סימולי מניות באנגלית (למשל AAPL, TSLA), בחרו טווח תאריכים וקבלו היסטוריית מחירים בשניות.
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 text-right">
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-indigo-900 mb-2">סימולי מניות (מופרדים בפסיק)</label>
                <input id="tickers" type="text" value="AAPL, TSLA, MSFT" 
                       class="w-full px-4 py-3 rounded-xl border border-indigo-100 focus:ring-2 focus:ring-indigo-500 outline-none text-left font-mono" dir="ltr">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-indigo-900 mb-2">תאריך התחלה</label>
                <input id="startDate" type="date" value="2024-01-01" class="w-full px-4 py-3 rounded-xl border border-indigo-100 outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-indigo-900 mb-2">תאריך סיום</label>
                <input id="endDate" type="date" value="2025-01-01" class="w-full px-4 py-3 rounded-xl border border-indigo-100 outline-none">
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-indigo-900 mb-2">תדירות נתונים</label>
                <select id="frequency" class="w-full px-4 py-3 rounded-xl border border-indigo-100 outline-none bg-white">
                    <option value="daily">יומי (Daily)</option>
                    <option value="weekly">שבועי (Weekly)</option>
                </select>
            </div>
        </div>

        <button onclick="fetchData()" id="mainBtn" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-all shadow-lg flex items-center justify-center gap-3">
            <span id="btnText">טען נתונים</span>
            <div id="loader" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full loader"></div>
        </button>

        <div id="statusBox" class="hidden mt-6 p-4 rounded-xl text-center font-medium"></div>

        <div id="resultsArea" class="mt-12 hidden">
            <h3 class="text-xl font-bold text-indigo-900 mb-4 border-b pb-2 text-right">תצוגה מקדימה</h3>
            <div class="overflow-x-auto rounded-xl border border-indigo-50 bg-white/50 mb-6 shadow-inner">
                <table id="previewTable" class="w-full text-sm text-right"></table>
            </div>

            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <button onclick="downloadCSV()" class="px-8 py-3 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 shadow-md font-bold transition-all">הורד קובץ CSV</button>
                <button onclick="exportToSheets()" class="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-md font-bold transition-all text-sm">פתח ב-Google Sheets</button>
            </div>
        </div>
    </div>

    <script>
        // ה-URL החדש והמעודכן שלך
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyb6JzCmUPd0nXZhHp2Or5mnF2aG8bqsZL9lxJnBZff1UX4yfZj_TXR-LI7Y0qBSUjEEg/exec";
        
        let storedCsvData = "";

        function showStatus(text, isError = true) {
            const box = document.getElementById('statusBox');
            box.innerText = text;
            box.className = `mt-6 p-4 rounded-xl text-center font-medium ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            box.classList.remove('hidden');
        }

        async function fetchData() {
            const tickers = document.getElementById('tickers').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            if (!tickers || !startDate || !endDate) {
                showStatus("אנא מלאו את כל השדות.");
                return;
            }

            // מצב טעינה
            document.getElementById('statusBox').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('btnText').innerText = "מושך נתונים...";
            document.getElementById('mainBtn').disabled = true;

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        tickers, startDate, endDate, 
                        frequency: document.getElementById('frequency').value,
                        action: 'csv'
                    })
                });

                const result = await response.json();

                if (result.status === "success") {
                    storedCsvData = result.csvData;
                    renderTable(result.csvData);
                    document.getElementById('resultsArea').classList.remove('hidden');
                    document.getElementById('resultsArea').scrollIntoView({ behavior: 'smooth' });
                } else {
                    showStatus("שגיאה: " + result.message);
                }
            } catch (err) {
                showStatus("תקלה בתקשורת מול גוגל. וודאו שהסקריפט מפורסם ל-'Anyone'.");
                console.error(err);
            } finally {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('btnText').innerText = "טען נתונים";
                document.getElementById('mainBtn').disabled = false;
            }
        }

        function renderTable(csvText) {
            const rows = csvText.trim().split('\n').slice(0, 7);
            let html = "";
            rows.forEach((row, index) => {
                const cells = row.split(',');
                html += `<tr>`;
                cells.forEach(cell => {
                    const tag = index === 0 ? 'th' : 'td';
                    const css = index === 0 ? 'bg-indigo-50/50 p-3 font-bold border-b' : 'p-3 border-b text-gray-700';
                    html += `<${tag} class="${css}">${cell}</${tag}>`;
                });
                html += `</tr>`;
            });
            document.getElementById('previewTable').innerHTML = html;
        }

        function downloadCSV() {
            const blob = new Blob([storedCsvData], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `Data_${new Date().toLocaleDateString()}.csv`);
            link.click();
        }

        async function exportToSheets() {
            showStatus("מייצר גליון גוגל חדש... אנא המתינו", false);
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        tickers: document.getElementById('tickers').value,
                        startDate: document.getElementById('startDate').value,
                        endDate: document.getElementById('endDate').value,
                        frequency: document.getElementById('frequency').value,
                        action: 'sheet'
                    })
                });
                const res = await response.json();
                if (res.status === "success") {
                    showStatus("הגליון נוצר בהצלחה!", false);
                    window.open(res.sheetUrl, '_blank');
                } else {
                    showStatus("שגיאת ייצוא: " + res.message);
                }
            } catch (e) {
                showStatus("תקלה בתקשורת בזמן ייצוא לגליון.");
            }
        }
    </script>
</body>
</html>
