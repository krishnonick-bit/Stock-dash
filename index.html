<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחלץ נתונים פיננסיים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #1e1b4b); background-size: 400% 400%; animation: gradient 15s ease infinite; min-height: 100vh; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .loader { border-top-color: #6366f1; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-8">

    <div class="max-w-4xl w-full glass-card rounded-[2rem] shadow-2xl overflow-hidden p-8 md:p-12">
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-indigo-900 mb-4">מחלץ נתונים פיננסיים</h1>
            <p class="text-gray-600">הזן סימולי מניות, בחר תאריכים ולחץ על טען.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold mb-2">סימולי מניות (AAPL, TSLA...)</label>
                <input id="tickers" type="text" value="AAPL, MSFT" class="w-full px-4 py-3 rounded-xl border outline-none focus:ring-2 focus:ring-indigo-500 text-left" dir="ltr">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">תאריך התחלה</label>
                <input id="startDate" type="date" class="w-full px-4 py-3 rounded-xl border outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">תאריך סיום</label>
                <input id="endDate" type="date" class="w-full px-4 py-3 rounded-xl border outline-none">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold mb-2">תדירות</label>
                <select id="frequency" class="w-full px-4 py-3 rounded-xl border outline-none bg-white">
                    <option value="daily">יומי</option>
                    <option value="weekly">שבועי</option>
                </select>
            </div>
        </div>

        <button onclick="fetchMarketData()" id="mainBtn" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-all flex items-center justify-center gap-3">
            <span id="btnText">טען נתונים</span>
            <div id="loader" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full loader"></div>
        </button>

        <div id="alertBox" class="hidden mt-6 p-4 rounded-xl text-center font-medium"></div>

        <div id="previewContainer" class="mt-12 hidden text-right">
            <h3 class="font-bold mb-2">תצוגה מקדימה:</h3>
            <div class="overflow-x-auto rounded-xl border bg-white/50 mb-6">
                <table id="previewTable" class="w-full text-sm text-right"></table>
            </div>
            <div class="flex gap-4 justify-center">
                <button onclick="downloadCSV()" class="px-6 py-2 bg-emerald-500 text-white rounded-lg font-semibold">הורד CSV</button>
                <button onclick="exportToSheets()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-semibold">פתח ב-Google Sheets</button>
            </div>
        </div>
    </div>

    <script>
        // הכתובת החדשה שלך:
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbym_l_XLwJJm08vh7ugSaky_JXwSRp6pPWLIdGQ0WD4-XdbfsBbz5utnVSDf4SbRIVC/exec";
        let globalCSVData = "";

        function showAlert(msg, isError = true) {
            const box = document.getElementById('alertBox');
            box.innerText = msg;
            box.className = `mt-6 p-4 rounded-xl text-center ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            box.classList.remove('hidden');
        }

        async function fetchMarketData() {
            const tickers = document.getElementById('tickers').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            if (!tickers || !startDate || !endDate) { showAlert("מלא את כל השדות"); return; }

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('btnText').innerText = "מתקשר עם גוגל...";
            document.getElementById('mainBtn').disabled = true;

            try {
                // שליחת POST לשרת
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'cors', // הוספת מצב CORS מפורש
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        tickers, startDate, endDate, 
                        frequency: document.getElementById('frequency').value,
                        action: 'csv'
                    })
                });

                if (!response.ok) throw new Error("HTTP error! status: " + response.status);

                const result = await response.json();
                if (result.status === "success") {
                    globalCSVData = result.csvData;
                    buildPreview(result.csvData);
                } else { showAlert(result.message); }
            } catch (err) {
                console.error("Fetch error:", err);
                showAlert("שגיאה: וודא שביצעת Deploy כ-Web App ל-Anyone ואישרת הרשאות.");
            } finally {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('btnText').innerText = "טען נתונים";
                document.getElementById('mainBtn').disabled = false;
            }
        }

        function buildPreview(csv) {
            const rows = csv.trim().split('\n').slice(0, 6);
            let h = "";
            rows.forEach((r, i) => {
                h += `<tr>${r.split(',').map(c => `<${i? 'td':'th'} class="p-3 border-b text-right">${c}</${i? 'td':'th'}>`).join('')}</tr>`;
            });
            document.getElementById('previewTable').innerHTML = h;
            document.getElementById('previewContainer').classList.remove('hidden');
        }

        function downloadCSV() {
            const blob = new Blob([globalCSVData], { type: 'text/csv;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'Market_Data.csv';
            a.click();
        }

        async function exportToSheets() {
            showAlert("מייצא לגליון חדש...", false);
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        tickers: document.getElementById('tickers').value,
                        startDate: document.getElementById('startDate').value,
                        endDate: document.getElementById('endDate').value,
                        frequency: document.getElementById('frequency').value,
                        action: 'sheet'
                    })
                });
                const res = await response.json();
                if (res.status === "success") window.open(res.sheetUrl, '_blank');
            } catch (e) { showAlert("תקלה בייצוא"); }
        }
    </script>
</body>
</html>
